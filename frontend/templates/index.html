<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
</head>

<body>
    <h1>My Notes</h1>
    <a href="{{ url_for('add') }}">Add Note</a>
    <ul>
        {% for note in notes %}
            <li>
                <strong>{{ note['title'] }}</strong>: {{ note['content'] }}
                <a href="{{ url_for('delete', id=note['id']) }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
    <script src="/static/api.js"></script>
</body>
</html>
