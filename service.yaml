apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort          # exposes the service outside the cluster
  selector:
    app: flask-app
  ports:
    - port: 5000          # container port
      targetPort: 5000    # inside pod
      nodePort: 30007     # host port (must be 30000-32767)
